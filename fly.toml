app = 'jme-bot-backend'
primary_region = 'gru'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.http_options]
    idle_timeout = 600

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "180s"
    method = "GET"
    path = "/api/health"

[mounts]
  source = "whatsapp_session"
  destination = "/data"

[[restart]]
  policy = "always"
  max_retries = 10

[machine]
  memory = "1024"
  cpu_kind = "shared"
  cpus = 1